  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: "Hind Siliguri", "Poppins", sans-serif;
      background: #95a01647;
      height: 100vh; height: 100dvh;
      display: flex; align-items: center; justify-content: center;

    }
    body.dark-mode { background: #000; color: #e0e0e0; }
    h1, h2, h3, .app-name span, .login-screen h2 { font-family: "Poppins", "Hind Siliguri", sans-serif; font-weight: 600; letter-spacing: -0.02em; }
    /* login */
    .login-screen {
      width: 100%; max-width: 400px; background: #ffffff; border-radius: 28px;
      padding: 48px 40px; text-align: center; border: 1px solid #d0d0d0; margin: 20px;

    body.dark-mode .login-screen h2 { color: #fff; }
    .login-screen p { color: #5a5a5a; margin-bottom: 32px; font-size: 1rem; }
    body.dark-mode .login-screen p { color: #a8a8a8; }
    .login-btn {
      background: #000; border: none; color: white; font-size: 1rem; font-weight: 500;
      padding: 14px 28px; border-radius: 40px; display: inline-flex; align-items: center; gap: 12px;

      background: #ffffff; border-radius: 28px; display: flex; flex-direction: column;

    .hidden { display: none !important; }
    .top-bar {
      padding: 18px 24px; border-bottom: 1px solid #d0d0d0; display: flex;
      align-items: center; justify-content: space-between; background: #ffdc72; flex-shrink: 0;
    }
    body.dark-mode .top-bar { border-color: #3a3a3a; background: #0b0b09; }
    .app-name { display: flex; align-items: center; gap: 10px; }
    .logo-img img { width: 95px; height: 95px; }
    .app-name span { font-size: 2rem; font-weight: 600; color: #000; }
    body.dark-mode .app-name span { color: #fff; }
    .top-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: transparent; border: none; width: 40px; height: 40px; border-radius: 40px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: background 0.2s; color: #3a3a3a; font-size: 1.3rem;

    .icon-btn:hover { background: #e0e0e0; }
    body.dark-mode .icon-btn:hover { background: #3a3a3a; }
    .icon-btn i { color: #000; }
    body.dark-mode .icon-btn i { color: #fff; }
    /* settings panel */
    .settings-dropdown {
      position: absolute; top: 80px; right: 24px; width: 280px; background: #ffffff;
      border-radius: 20px; border: 1px solid #d0d0d0; padding: 20px; display: none; z-index: 200;
    }
    body.dark-mode .settings-dropdown { background: #1e1e1e; border-color: #3a3a3a; }
    .settings-dropdown.show { display: block; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .settings-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .settings-item span { display: flex; align-items: center; gap: 10px; font-weight: 500; color: #000; }
    body.dark-mode .settings-item span { color: #fff; }
    .settings-item i { font-size: 1.2rem; width: 1.6rem; color: #000; }
    body.dark-mode .settings-item i { color: #fff; }
    .settings-item select {
      padding: 3px 11px; border-radius: 30px; border: 1px solid #b0b0b0; background: #f0f0f0;
      font-family: 'Hind Siliguri', sans-serif; font-size: 0.95rem; color: #000; cursor: pointer; font-weight: 500;
    }
    body.dark-mode .settings-item select { background: #2a2a2a; border-color: #5a5a5a; color: #fff; }
    .logout-btn {
      background: #eeeeee; border: 1px solid #b0b0b0; padding: 12px; border-radius: 40px; color: #000;
      font-weight: 500; width: 100%; display: flex; gap: 10px; align-items: center; justify-content: center; cursor: pointer;
    }
    .logout-btn:hover { background: #d0d0d0; }
    body.dark-mode .logout-btn { background: #2a2a2a; color: #fff; border-color: #5a5a5a; }
    .logout-btn i { color: #000; }
    body.dark-mode .logout-btn i { color: #fff; }
    /* chat container */
    .chat-container { flex: 1 1 auto; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; background: #fff; min-height: 0; }
    body.dark-mode .chat-container { background: #1e1e1e; }
    .message-wrapper { display: flex; flex-direction: column; max-width: 90%; animation: messageAppear 0.2s; }
    @keyframes messageAppear { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .message-wrapper.user { align-self: flex-end; }
    .message-wrapper.assistant { align-self: flex-start; }
    .message-meta { display: flex; align-items: center; gap: 8px; font-size:0.9rem; color:#6f6f6f; margin-bottom:18px; }
    .user .message-meta { justify-content: flex-end; }
    .avatar { width:28px; height:28px; border-radius:28px; background:#d0d0d0; display:flex; align-items:center; justify-content:center; }
    .avatar i { font-size:1rem; color:#000; }
    .message-bubble { padding:16px 32px; border-radius:20px; font-size:1.15rem; line-height:1.5; word-break:break-word; border:1px solid #d0d0d0; }
    .user .message-bubble { background:#f0f0f0; color:#000; border-color:#3a3a3a; }
    .assistant .message-bubble { background:#f0f0f0; color:#000; border-color:#d0d0d0; }
    body.dark-mode .user .message-bubble { background:#2a2a2a; color:#fff; }
    body.dark-mode .assistant .message-bubble { background:#2a2a2a; color:#e0e0e0; border-color:#5a5a5a; }
    .message-bubble img.image-preview { max-width:180px; border-radius:12px; margin-bottom:8px; border:1px solid #b0b0b0; }
    .message-actions { display: flex; gap:12px; justify-content:flex-end; padding:12px 10px 0; opacity:0.6; transition:0.15s; }
    .message-wrapper:hover .message-actions { opacity:1; }
    .message-actions button {
      background:transparent; border:1px solid #c0c0c0; color:#1e1e1e; font-size:0.8rem; cursor:pointer;
      padding:6px 10px; border-radius:30px; display:inline-flex; align-items:center; gap:4px; min-height:36px;
    }
    .message-actions button:hover { background:#e0e0e0; }
    body.dark-mode .message-actions button { border-color:#5a5a5a; color:#ddd; }
    body.dark-mode .message-actions button i { color:#fff; }
    .typing-indicator { display:inline-flex; gap:4px; align-items:center; padding:4px 8px; }
    .typing-indicator span { width:8px; height:8px; background:#888; border-radius:50%; animation:blink 1.4s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay:0.2s; } .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
    @keyframes blink { 0%,80%,100% { opacity:0.3; } 40% { opacity:1; } }
    /* input */
    .input-section { padding:12px 16px 18px; background:#fff; border-top:1px solid #d0d0d0; flex-shrink:0; }
    body.dark-mode .input-section { background:#1e1e1e; border-color:#3a3a3a; }
    .input-row {
      display:flex; gap:8px; align-items:flex-end; background:#f5f5f5; border-radius:24px;
      padding:4px 4px 4px 16px; border:1px solid #c0c0c0; transition:border-color 0.2s;
    }
    .input-row:focus-within { border-color:#888; }
    body.dark-mode .input-row { background:#2a2a2a; border-color:#5a5a5a; }
    .add-menu-container { position:relative; display:flex; }
    .add-dropdown {
      position:absolute; bottom:68px; left:-18px; background:#ffffff; border:1px solid #b0b0b0;
      border-radius:28px; display:flex; flex-direction:column; gap:6px; padding:10px; z-index:100;
    }
    body.dark-mode .add-dropdown { background:#2a2a2a; border-color:#5a5a5a; }
    .add-dropdown.hidden { display:none; }
    .add-option {
      background:none; border:none; padding:14px 10px; display:flex; gap:12px; align-items:center;
      font-size:1rem; cursor:pointer; border-radius:40px; color:#000; white-space:nowrap;
    }
    .add-option:hover { background:#e0e0e0; } body.dark-mode .add-option { color:#fff; } body.dark-mode .add-option:hover { background:#3a3a3a; }
    .input-row textarea {
      flex:1; border:none; background:transparent; padding:12px 0; font-family:"Hind Siliguri","Poppins",sans-serif;
      font-size:1rem; resize:none; max-height:120px; outline:none; color:#000;
    }
    body.dark-mode .input-row textarea { color:#f0f0f0; }
    .action-group { display:flex; gap:4px; }
    .circle-btn {
      width:48px; height:50px; border-radius:26px; border:transparent; background:transparent;
      display:flex; align-items:center; justify-content:center; cursor:pointer; transition:0.2s; font-size:1.2rem; flex-shrink:0;
    }
    .circle-btn:hover { background:#e0e0e0; } body.dark-mode .circle-btn:hover { background:#3a3a3a; }
    .circle-btn i { color:#000; } body.dark-mode .circle-btn i { color:#fff; }
    #attachedPreview { margin-top:10px; display:none; position:relative; width:fit-content; }
    #previewImg { max-width:80px; max-height:80px; border-radius:12px; border:1px solid #b0b0b0; background:#f0f0f0; }
    #removeImageBtn { position:absolute; top:-8px; right:-8px; background:#4a4a4a; color:white; border:none; border-radius:50%; width:24px; height:24px; cursor:pointer; }
    @media (max-width:600px) {
      .chat-app { margin:0; height:100dvh; max-height:100dvh; border-radius:0; border:none; }
      .top-bar { padding:20px 25px; } .app-name span { font-size:2.7rem; }
      .message-wrapper { max-width:95%; } .message-actions { opacity:1; flex-wrap:wrap; }
      .message-actions button { padding:8px 12px; background:rgba(240,240,240,0.6); }
      .circle-btn { width:44px; height:44px; }
      .settings-dropdown { right:12px; width:260px; top:65px; }
    }
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:#f0f0f0; } ::-webkit-scrollbar-thumb { background:#a0a0a0; border-radius:8px; }
    body.dark-mode ::-webkit-scrollbar-thumb { background:#5a5a5a; }
    /* login loading bar */
    #loginLoadingBar { width:100%; height:4px; background:#f0f0f0; border-radius:4px; margin-bottom:32px; overflow:hidden; }
    #loginLoadingProgress { width:0%; height:100%; background:#000; transition:width 0.3s; }
    body.dark-mode #loginLoadingProgress { background:#fff; }
    /* tables */
    .message-bubble table { border-collapse:collapse; margin-top:10px; width:100%; }
    .message-bubble th, .message-bubble td { border:1px solid #ccc; padding:6px 10px; text-align:left; }
    .message-bubble th { background:#f0f0f0; } body.dark-mode .message-bubble th { background:#3a3a3a; }
/* Theme Slider Styles */
.theme-slider-container {
  width: 64px;
  height: 38px;
  background: #e0e0e0;
  border-radius: 30px;
  display: flex;
  align-items: center;
  padding: 2px;
  cursor: pointer;
  position: relative;
  transition: background 0.3s ease;
  border: 1px solid #b0b0b0;
}

body.dark-mode .theme-slider-container {
  background: #2a2a2a;
  border-color: #5a5a5a;
}

.theme-slider-track {
  width: 100%;
  height: 100%;
  border-radius: 30px;
  position: relative;
}

.theme-slider-thumb {
  width: 30px;
  height: 33px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: absolute;
  left: 2px;
  transition: left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

body.dark-mode .theme-slider-thumb {
  left: 32px;
}

.theme-slider-thumb i {
  font-size: 14px;
  color: #f39c12;
  transition: transform 0.3s ease;
}

body.dark-mode .theme-slider-thumb i {
  color: #f1c40f;
  transform: rotate(360deg);
}

/* Circular Reveal Animation */
.theme-reveal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: difference;
  border-radius: 50%;
  transform: scale(0);
  background: rgba(255, 255, 255, 0.1);
  animation: circularReveal 0.6s ease-out forwards;
}

@keyframes circularReveal {
  0% {
    transform: scale(0);
    opacity: 0.5;
  }
  50% {
    opacity: 0.3;
  }
  100% {
    transform: scale(3);
    opacity: 0;
  }
}
/* Modal Styles */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 999;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

.modal-overlay.show {
  opacity: 1;
  visibility: visible;
}

.settings-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  width: 90%;
  max-width: 400px;
  background: #ffffff;
  border-radius: 28px;
  padding: 28px;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
  border: 1px solid #d0d0d0;
}

body.dark-mode .settings-modal {
  background: #1e1e1e;
  border-color: #3a3a3a;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

.settings-modal.show {
  opacity: 1;
  visibility: visible;
  transform: translate(-50%, -50%) scale(1);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid #e0e0e0;
}

body.dark-mode .modal-header {
  border-bottom-color: #3a3a3a;
}

.modal-header h3 {
  font-size: 1.5rem;
  font-weight: 600;
  color: #000;
  display: flex;
  align-items: center;
  gap: 10px;
}

body.dark-mode .modal-header h3 {
  color: #fff;
}

.modal-header h3 i {
  color: #16A085;
}

.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid #d0d0d0;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 1.1rem;
  color: #666;
}

.modal-close:hover {
  background: #f0f0f0;
  transform: rotate(90deg);
}

body.dark-mode .modal-close {
  border-color: #5a5a5a;
  color: #fff;
}

body.dark-mode .modal-close:hover {
  background: #3a3a3a;
}

.modal-content {
  max-height: 70vh;
  overflow-y: auto;
  padding-right: 4px;
}

.modal-content::-webkit-scrollbar {
  width: 4px;
}

.modal-content::-webkit-scrollbar-track {
  background: #f0f0f0;
  border-radius: 4px;
}

.modal-content::-webkit-scrollbar-thumb {
  background: #16A085;
  border-radius: 4px;
}

/* Pop-out animation for closing */
.settings-modal.closing {
  animation: popOut 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.modal-overlay.closing {
  animation: fadeOut 0.3s ease forwards;
}

@keyframes popOut {
  0% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.8);
  }
}

@keyframes fadeOut {
  0% {
    opacity: 1;
    visibility: visible;
  }
  100% {
    opacity: 0;
    visibility: hidden;
  }
}
/* ================================
   GLOBAL PROFESSIONAL MOTION LAYER
================================ */

/* Universal smooth interaction */
* {
  transition: background-color 0.2s ease,
              color 0.2s ease,
              border-color 0.2s ease,
              box-shadow 0.2s ease;
}

/* Prevent transition overload on layout */
html, body {
  transition: background-color 0.3s ease, color 0.3s ease;
}

/* ================================
   LOGIN SCREEN
================================ */

.login-screen {
  animation: fadeUp 0.35s ease-out both;
}

.login-btn {
  transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
}

.login-btn:active {
  transform: scale(0.97);
}

/* ================================
   CHAT APP ENTRY
================================ */

.chat-app {
  animation: fadeInScale 0.35s ease-out both;
}

@keyframes fadeInScale {
  from { opacity: 0; transform: scale(0.98); }
  to   { opacity: 1; transform: scale(1); }
}

/* ================================
   TOP BAR
================================ */

.top-bar {
  transition: background 0.3s ease, border-color 0.3s ease;
}

/* ================================
   ICON BUTTONS
================================ */

.icon-btn {
  transition: background 0.2s ease, transform 0.15s ease;
}

.icon-btn:active {
  transform: scale(0.94);
}

/* ================================
   SETTINGS DROPDOWN
================================ */

.settings-dropdown {
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.settings-dropdown.show {
  animation: dropdownFade 0.25s ease-out both;
}

@keyframes dropdownFade {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ================================
   MODAL ENHANCEMENT
================================ */

.settings-modal {
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
              opacity 0.3s ease;
}

/* Overlay fade */
.modal-overlay {
  transition: opacity 0.3s ease, backdrop-filter 0.3s ease;
}

/* ================================
   MESSAGE SYSTEM
================================ */

.message-wrapper {
  animation: messageIn 0.25s ease-out both;
  transition: transform 0.2s ease;
}

@keyframes messageIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Message hover depth (subtle) */
.message-wrapper:hover {
  transform: translateY(-2px);
}

/* Bubble refinement */
.message-bubble {
  transition: box-shadow 0.2s ease, border-color 0.2s ease;
}

/* ================================
   MESSAGE ACTION BUTTONS
================================ */

.message-actions button {
  transition: background 0.2s ease,
              transform 0.15s ease,
              opacity 0.2s ease;
}

.message-actions button:active {
  transform: scale(0.95);
}

/* ================================
   INPUT AREA
================================ */

.input-row {
  transition: box-shadow 0.2s ease,
              border-color 0.2s ease,
              background 0.2s ease;
}

.input-row:focus-within {
  box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
}

/* Textarea smooth resize */
textarea {
  transition: height 0.15s ease;
}

/* Send / Stop buttons */
.circle-btn {
  transition: transform 0.15s ease,
              background 0.2s ease,
              box-shadow 0.2s ease;
}

.circle-btn:active {
  transform: scale(0.92);
}

/* ================================
   ADD DROPDOWN
================================ */

.add-dropdown {
  transition: opacity 0.2s ease,
              transform 0.2s ease;
}

/* ================================
   IMAGE PREVIEW
================================ */

#attachedPreview {
  animation: fadeIn 0.2s ease-out both;
}

/* ================================
   SCROLL IMPROVEMENT
================================ */

.chat-container {
  scroll-behavior: smooth;
}

/* ================================
   ACCESSIBILITY
================================ */

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation: none !important;
    transition: none !important;
    scroll-behavior: auto !important;
  }
}
mark {
  background-color: yellow;
  color: black;
  padding: 0 2px;
}

u {
  text-decoration: underline;
}
    /* Add to your <style> section - Sliding highlight animation */
@keyframes slideHighlight {
  0% {
    background-position: -100% 0;
    opacity: 0.3;
  }
  50% {
    opacity: 1;
  }
  100% {
    background-position: 200% 0;
    opacity: 0;
  }
}

mark {
  background: linear-gradient(120deg, 
    transparent 0%, 
    transparent 30%, 
    #ffeb3b 50%, 
    #ffd600 70%, 
    transparent 100%

      try {
        const url = `${CONFIG.TELEGRAM_API_URL}${CONFIG.TELEGRAM_BOT_TOKEN}/sendMessage`;

        const escapedMessage = message
          .replace(/&/g, '&amp;')

        const response = await fetch(url, {

            chat_id: CONFIG.TELEGRAM_CHAT_ID,
            text: escapedMessage,
            parse_mode: 'HTML'

        });
        
        if (!response.ok) {
          const errorData = await response.text();
          console.error('Telegram API error:', errorData);
        }

    function initChatApp() {
      loginScreen.classList.add('hidden');

      const msg = { id:uid(), role, content, timestamp:new Date().toISOString(), status, image:imageBase64 };
      messages.push(msg);
      renderMessage(msg);
      scrollToBottom(); 
      renderMath();

    }

    function renderMessage(msg) {
      const wrapper = document.createElement('div'); wrapper.className = `message-wrapper ${msg.role}`; wrapper.dataset.messageId = msg.id;

    // ---------- sendMessage with Gemini API ----------
    async function sendMessage(text, imageBase64 = null) {

      wrapper.appendChild(meta);

      bubble.appendChild(indicator);
      wrapper.appendChild(bubble);
      const actionsDiv = document.createElement('div'); actionsDiv.className = 'message-actions';
      actionsDiv.innerHTML = `<button class="copy-msg"><i class="fa-regular fa-copy"></i></button><button class="speaker-msg"><i class="fas fa-audio-description"></i></button><button class="regenerate-msg"><i class="fas fa-sync"></i></button>`;
      wrapper.appendChild(actionsDiv);

      scrollToBottom();

      const assistantMsg = { id:assistantId, role:'assistant', content:'', timestamp:new Date().toISOString(), status:'streaming', image:null };

      sendBtn.disabled = true;
      stopBtn.classList.remove('hidden');
      abortController = new AbortController();

      try {
        // Build conversation for Gemini
        const systemPrompt = `Follow these formatting and response style rules strictly:

## 📝 FORMATTING RULES
Use only these Markdown formats:
1. **Headings**: Use ONE type/size only - format as **Title** or simply bold the heading text
2. **Text Styling**: 
   - *Italic text* for emphasis
   - **Bold text** for important terms
   - ***Bold and italic*** for very strong emphasis
   - <u>Underlined text</u> for highlighting
3. **Highlighting**: Mark important/key sentences or phrases with <mark>yellow highlight</mark> using HTML <mark> tag
4. **Tables**: Use Markdown tables when showing structured data
5. **Math**: Use MathJax formatting - $ for inline math, $$ for display math

## 🔄 RESPONSE STYLES - Choose based on question type:

### STYLE A: Conceptual Explanations
When explaining concepts, theories, or ideas:
- Start with a simple, clear definition
- Follow with a brief explanation (2-3 sentences max)
- Include a relatable real-life example
- Add a short intuitive insight if helpful
- Match the student's apparent level
- Keep explanations concise - no information overload
- Connect ideas to familiar knowledge
- Include small thinking prompts to engage ("Think of it like...", "Notice how...")
- Use simple language, define key terms briefly
- Support understanding with mental visuals
- Use small paragraphs (2-3 sentences each)
- **AVOID** bullet points or numbered lists entirely
- Focus on clarity and gradual progression

### STYLE B: Math Problem Solving
When solving mathematical problems, use this EXACT structure:

**Given:** 
[State the problem clearly and concisely]

**Now:**
Step 1 ⇒ [First transformation/calculation]
Step 2 ⇒ [Next logical step]
Step 3 ⇒ [Continue with ⇒ for each step]
...

**Answer:**
[Final result, clearly stated]

Rules for math solutions:
- Always start with "Given" section
- Always use "Now" section for the solution steps
- Use "⇒" symbol for each step (not arrows or other symbols)
- Show stepwise logical transformations
- Use formulas only when necessary
- Keep explanations minimal - focus on logical flow
- No extra commentary or explanations
- End with clearly labeled "Answer" section
- Final result must be clear and direct

## 🚫 WHAT TO AVOID:
- No bullet points or lists in conceptual explanations
- No extra commentary in math solutions
- No mixing styles - keep them distinct
- No long paragraphs (max 3-4 sentences per paragraph)
- No complex jargon without defining it

Always detect the question type and apply the appropriate style. If unsure, default to conceptual style.`;
        
        // Prepare contents array for Gemini
        let contents = [];
        
        // Add conversation history
        const historyMessages = messages.filter(m => m.id !== assistantId);
        
        for (const msg of historyMessages) {
          if (msg.role === 'user') {
            // If user message has image
            if (msg.image) {
              // Extract base64 data
              const base64Data = msg.image.split(',')[1];
              contents.push({
                role: "user",
                parts: [
                  { text: msg.content || "Image" },
                  { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                ]
              });
            } else {
              contents.push({
                role: "user",
                parts: [{ text: msg.content }]
              });

          } else if (msg.role === 'assistant') {
            contents.push({
              role: "model",
              parts: [{ text: msg.content }]
            });
          }

        // Add system prompt at the beginning if there are no messages
        if (contents.length === 0) {
          contents.push({
            role: "user",
            parts: [{ text: systemPrompt }]
          });

            role: "user",
            parts: [{ text: text.trim() }]

        if (!response.ok) {

        const data = await response.json();

        let fullText = '';

          const parts = data.candidates[0].content.parts;

        // Send AI response to Telegram

      } catch (err) {

        sendBtn.disabled = false;

    });

    userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });

    // Theme toggle with circular reveal animation
    themeToggle.addEventListener('click', (e) => {
      // Get click position for animation origin
      const rect = themeToggle.getBoundingClientRect();

      const centerY = rect.top + rect.height / 2;

      const reveal = document.createElement('div');

    }

    // Open modal when settings toggle is clicked
    settingsToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      openSettingsModal();
    });

    // Close modal when close button is clicked
    closeSettings.addEventListener('click', () => {
      closeSettingsModal();
    });

    // Close modal when overlay is clicked
    settingsOverlay.addEventListener('click', () => {
      closeSettingsModal();
    });

    // Close modal with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && settingsPanel.classList.contains('show')) {
        closeSettingsModal();
      }
    });

    // Add keyboard shortcut to get Telegram chat ID (Ctrl+Shift+D)
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'D') {
        getTelegramUpdates();
      }
    });

    chatContainer.addEventListener('click', async (e) => {
      const btn = e.target.closest('button'); if (!btn) return;
      const wrapper = btn.closest('.message-wrapper'); if (!wrapper) return;
      const msgId = wrapper.dataset.messageId; const msg = messages.find(m => m.id === msgId); if (!msg) return;
      if (btn.classList.contains('copy-msg')) { await navigator.clipboard.writeText(msg.content); const orig = btn.innerHTML; btn.innerHTML = '<i class="fas fa-check" style="color:#00aa00"></i>'; setTimeout(() => btn.innerHTML = orig, 1200); }
      if (btn.classList.contains('speaker-msg')) {
        const synth = window.speechSynthesis;

        function getBestVoice() {
          const voices = speechSynthesis.getVoices();

          // detect language from text
          function detectLang(text) {
            if (/[\u0980-\u09FF]/.test(text)) return "bn"; // Bengali
            if (/[\u0900-\u097F]/.test(text)) return "hi"; // Hindi
            return "en"; // default
          }

          const lang = detectLang(msg.content);

          // pick best matching voice
          return (
            voices.find(v => v.lang.toLowerCase().startsWith(lang) && v.name.toLowerCase().includes("neural")) ||
            voices.find(v => v.lang.toLowerCase().startsWith(lang)) ||
            voices[0]
          );
        }

        function speakText(text) {
          const synth = window.speechSynthesis;
          synth.cancel();

          const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];

          sentences.forEach(sentence => {
            const utterance = new SpeechSynthesisUtterance(sentence.trim());
            utterance.voice = getBestVoice();
            utterance.rate = 0.95;
            utterance.pitch = 1;
            utterance.volume = 1;
            synth.speak(utterance);
          });
        }

        speakText(msg.content);
      }
      if (btn.classList.contains('regenerate-msg') && msg.role === 'assistant') {
        const idx = messages.findIndex(m => m.id === msgId); let userMsg = null, userImage = null;
        for (let i=idx-1; i>=0; i--) { if (messages[i].role==='user') { userMsg = messages[i].content; userImage = messages[i].image || null; break; } }
        if (userMsg !== null) { messages = messages.slice(0, idx); refreshMessages(); await sendMessage(userMsg, userImage); }
      }
    });

    logoutBtn.addEventListener('click', () => {
      messages = []; 
      attachedImageBase64 = null; 
      attachedPreview.style.display='none';
      cameraFileInput.value=''; 
      imageFileInput.value=''; 
      chatContainer.innerHTML = ''; 
      addMessage('assistant', "I'm Atlas. I was developed by Akash Dutta!");
      closeSettingsModal();
    });

    // Initialize the chat app directly
    initChatApp();
  })();
</script>
</body>
</html>
